name: deploy frontend
on:
 push:
   branches: [main]
   paths:
    - 'frontend/**'
 workflow-dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
       working-directory: ./frontend/
    steps:
     - name: checkout code
       uses: actions/checkout@v4
     - name: setup node
       uses: actions/setup-node@v4
       with:
         node-version: '20'
         cache: 'npm'
         cache-dependency-path: './frontend/package.json'
     - name: install dependencies
       run: npm install --legacy-peer-deps
       working-directory: ./frontend
     - name: Run test
       run: npm run test:ci
  deploy:
    needs: test
    runs-on: ubuntu-latest 
    defaults:
      run:
       working-directory: ./frontend
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: deploy app on amplify
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-north-1
        run: |
          aws amplify update-app --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --environment-variables REACT_APP_BACKEND_URL=${{ secrets.BACKEND_URL }} 
          aws amplify start-job --app-id ${{ secrets.AMPLIFY_APP_ID }} --branch-name main --job-type RELEASE
