name: frontend pipeline
on: 
 push:
   branches: [main]
   paths:
     - 'frontend/**'
jobs:
  test: 
    runs-on: ubuntu-latest
    defaults:
     run:
        working-directory: ./frontend/ 
    steps:
     - name: checkout code
       uses: actions/checkout@v4
     - name: setup node
       uses: actions/setup-node@v4
       with:
         node-version: '20'
         cache: 'npm'
     - name: install dependencies
       run: npm install
     - name: Run test
       run: npm test
     
      
